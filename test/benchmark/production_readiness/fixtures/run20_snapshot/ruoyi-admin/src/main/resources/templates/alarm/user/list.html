<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org" xmlns:shiro="http://www.w3.org/1999/xhtml">
<head>
	<th:block th:include="include :: header('通知用户列表')" />
</head>
<body>
    <div class="main-content">
        <form id="form-search" class="form-horizontal" method="post" th:action="${@contextPath}/alarm/user/list">
            <div class="row">
                <div class="col-sm-3">
                    <div class="form-group">
                        <label class="col-sm-4 control-label">用户名称：</label>
                        <div class="col-sm-8">
                            <input name="userName" class="form-control" type="text" placeholder="请输入用户名称">
                        </div>
                    </div>
                </div>
                <div class="col-sm-3">
                    <div class="form-group">
                        <label class="col-sm-4 control-label">手机号：</label>
                        <div class="col-sm-8">
                            <input name="phone" class="form-control" type="text" placeholder="请输入手机号">
                        </div>
                    </div>
                </div>
                <div class="col-sm-3">
                    <div class="form-group">
                        <label class="col-sm-4 control-label">状态：</label>
                        <div class="col-sm-8">
                            <select name="status" class="form-control">
                                <option value="">全部</option>
                                <option value="0">启用</option>
                                <option value="1">禁用</option>
                            </select>
                        </div>
                    </div>
                </div>
                <div class="col-sm-3">
                    <div class="form-group">
                        <button type="button" class="btn btn-primary" onclick="search()"><i class="fa fa-search"></i> 查 询</button>
                        <button type="button" class="btn btn-warning" onclick="reset()"><i class="fa fa-refresh"></i> 重 置</button>
                    </div>
                </div>
            </div>
        </form>
        <div class="btn-group">
            <shiro:hasPermission name="alarm:user:add">
                <button type="button" class="btn btn-success" onclick="add()"><i class="fa fa-plus"></i> 新增</button>
            </shiro:hasPermission>
            <shiro:hasPermission name="alarm:user:edit">
                <button type="button" class="btn btn-primary" onclick="edit()"><i class="fa fa-edit"></i> 修改</button>
            </shiro:hasPermission>
            <shiro:hasPermission name="alarm:user:remove">
                <button type="button" class="btn btn-danger" onclick="del()"><i class="fa fa-trash"></i> 删除</button>
            </shiro:hasPermission>
            <shiro:hasPermission name="alarm:user:export">
                <button type="button" class="btn btn-info" onclick="exportData()"><i class="fa fa-download"></i> 导出</button>
            </shiro:hasPermission>
        </div>
        <table id="bootstrap-table" data-url="${@contextPath}/alarm/user/list" data-pagination="true"
               data-toolbar="#toolbar" data-click-to-select="true" data-select-item-name="userId"
               data-url="${@contextPath}/alarm/user/list">
            <thead>
                <tr>
                    <th data-checkbox="true"></th>
                    <th data-field="userId" data-name="userId" data-sortable="true">用户ID</th>
                    <th data-field="userName" data-name="用户名称">用户名称</th>
                    <th data-field="slackId" data-name="Slack ID">Slack ID</th>
                    <th data-field="wechatWorkId" data-name="企业微信ID">企业微信ID</th>
                    <th data-field="email" data-name="邮箱">邮箱</th>
                    <th data-field="phone" data-name="手机号">手机号</th>
                    <th data-field="innerPushId" data-name="内部推送ID">内部推送ID</th>
                    <th data-field="voipId" data-name="VoIP ID">VoIP ID</th>
                    <th data-field="status" data-name="状态" data-formatter="statusFormatter">状态</th>
                    <th data-field="createTime" data-name="创建时间" data-sortable="true">创建时间</th>
                    <th data-formatter="operate" data-events="operateEvents" data-width="150">操作</th>
                </tr>
            </thead>
        </table>
    </div>
    <th:block th:include="include :: footer" />
    <script type="text/javascript">
        var prefix = ctx + "alarm/user";
        
        function statusFormatter(value, row) {
            if (value === '0') {
                return '<span class="label label-success">启用</span>';
            } else if (value === '1') {
                return '<span class="label label-danger">禁用</span>';
            }
            return value;
        }
        
        function operateEvents() {
            return [
                {
                    name: 'Edit',
                    text: '修改',
                    icon: 'fa fa-edit',
                    click: function(e, value, row) {
                        edit(row.userId);
                    }
                },
                {
                    name: 'Delete',
                    text: '删除',
                    icon: 'fa fa-trash',
                    click: function(e, value, row) {
                        del(row.userId);
                    }
                }
            ];
        }
        
        function add() {
            openDialog("新增通知用户", prefix + "/add", "800", "600");
        }
        
        function edit(userId) {
            var row = getSelectedRow();
            if (userId == null && row) {
                userId = row.userId;
            }
            if (userId == null) {
                $.modal.alertWarning("请选择一条记录");
                return;
            }
            openDialog("修改通知用户", prefix + "/edit/" + userId, "800", "600");
        }
        
        function del(userId) {
            var rows = getSelectedRows();
            if (userId == null && rows.length == 0) {
                $.modal.alertWarning("请选择一条记录");
                return;
            }
            var ids = userId || rows.map(function(row) { return row.userId; }).join(',');
            $.modal.confirm("确认删除选中的记录吗？", function() {
                $.ajax({
                    type: "DELETE",
                    url: prefix + "/delete",
                    data: { "ids": ids },
                    success: function(result) {
                        if (result.code == 0) {
                            $.modal.alertSuccess("删除成功");
                            $("#bootstrap-table").bootstrapTable("refresh");
                        } else {
                            $.modal.alertError(result.msg);
                        }
                    }
                });
            });
        }
        
        function exportData() {
            $.ajax({
                type: "POST",
                url: prefix + "/export",
                data: $("#form-search").serialize(),
                success: function(result) {
                    if (result.code == 0) {
                        window.location.href = result.data;
                    } else {
                        $.modal.alertError(result.msg);
                    }
                }
            });
        }
        
        function search() {
            $("#bootstrap-table").bootstrapTable("refresh");
        }
        
        function reset() {
            $("#form-search")[0].reset();
            search();
        }
    </script>
</body>
</html>
