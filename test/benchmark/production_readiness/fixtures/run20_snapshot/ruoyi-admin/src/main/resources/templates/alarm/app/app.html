<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org" xmlns:shiro="http://www.pollix.at/thymeleaf/shiro">
<head>
	<th:block th:include="include :: header('预警应用秘钥列表')" />
</head>
<body class="gray-bg">
	<div class="container-div">
		<div class="row">
			<div class="col-sm-12 search-collapse">
				<form id="app-form">
					<div class="select-list">
						<ul>
							<li>
								应用名称：<input type="text" name="appName"/>
							</li>
							<li>
								状态：<select name="status" th:with="type=${@dict.getType('sys_normal_disable')}">
									<option value="">所有</option>
									<option th:each="dict : ${type}" th:text="${dict.dictLabel}" th:value="${dict.dictValue}"></option>
								</select>
							</li>
							<li>
								<a class="btn btn-primary btn-rounded btn-sm" onclick="$.table.search()"><i class="fa fa-search"></i>&nbsp;搜索</a>
							    <a class="btn btn-warning btn-rounded btn-sm" onclick="$.form.reset()"><i class="fa fa-refresh"></i>&nbsp;重置</a>
							</li>
						</ul>
					</div>
				</form>
			</div>
		
			<div class="btn-group-sm" id="toolbar" role="group">
				<a class="btn btn-success" onclick="$.operate.add()" shiro:hasPermission="alarm:app:add">
	                <i class="fa fa-plus"></i> 新增
	            </a>
	            <a class="btn btn-primary single disabled" onclick="$.operate.edit()" shiro:hasPermission="alarm:app:edit">
		            <i class="fa fa-edit"></i> 修改
		        </a>
				<a class="btn btn-danger multiple disabled" onclick="$.operate.removeAll()" shiro:hasPermission="alarm:app:remove">
		            <i class="fa fa-remove"></i> 删除
		        </a>
		        <a class="btn btn-warning" onclick="$.table.exportExcel()" shiro:hasPermission="alarm:app:export">
		            <i class="fa fa-download"></i> 导出
		        </a>
	        </div>
	        
	        <div class="col-sm-12 select-table table-striped">
			    <table id="bootstrap-table"></table>
			</div>
		</div>
	</div>
	<th:block th:include="include :: footer" />
	<script th:inline="javascript">
		var editFlag = [[${@permission.hasPermi('alarm:app:edit')}]];
		var removeFlag = [[${@permission.hasPermi('alarm:app:remove')}]];
		var prefix = ctx + "alarm/app";
		
		$(function() {
		    var options = {
		        url: prefix + "/list",
		        createUrl: prefix + "/add",
		        updateUrl: prefix + "/edit/{id}",
		        removeUrl: prefix + "/remove",
		        exportUrl: prefix + "/export",
		        viewUrl: prefix + "/view/{id}",
		        sortName: "createTime",
		        sortOrder: "desc",
		        modalName: "预警应用秘钥",
		        columns: [{
		            checkbox: true
		        },
		        {
		            field: 'appId',
		            title: '应用ID'
		        },
		        {
		            field: 'appName',
		            title: '应用名称',
		            sortable: true,
		            formatter: function(value, row, index) {
		                return '<a href="javascript:void(0)" onclick="$.operate.view(\'' + row.appId + '\')">' + value + '</a>';
		            }
		        },
		        {
		            field: 'appSecret',
		            title: '应用秘钥',
		            formatter: function(value, row, index) {
		                if (value != null && value.length > 10) {
		                    return value.substring(0, 5) + '****' + value.substring(value.length - 5);
		                }
		                return value;
		            }
		        },
		        {
		            field: 'status',
		            title: '状态',
		            sortable: true,
		            formatter: function(value, row, index) {
		                if (value == '0') {
		                    return '<span class="badge badge-success">启用</span>';
		                } else if (value == '1') {
		                    return '<span class="badge badge-danger">禁用</span>';
		                }
		                return value;
		            }
		        },
		        {
		            field: 'expireTime',
		            title: '过期时间',
		            sortable: true
		        },
		        {
		            field: 'createTime',
		            title: '创建时间',
		            sortable: true
		        },
		        {
		            title: '操作',
		            align: 'center',
		            formatter: function(value, row, index) {
		                    var actions = [];
		                    actions.push('<a class="btn btn-success btn-xs ' + editFlag + '" href="javascript:void(0)" onclick="$.operate.edit(\'' + row.appId + '\')"><i class="fa fa-edit"></i>编辑</a> ');
		                    actions.push('<a class="btn btn-danger btn-xs ' + removeFlag + '" href="javascript:void(0)" onclick="$.operate.remove(\'' + row.appId + '\')"><i class="fa fa-remove"></i>删除</a> ');
		                    return actions.join('');
		            	}
		            }
		        }]
		    };
		    $.table.init(options);
		});
	</script>
</body>
</html>
