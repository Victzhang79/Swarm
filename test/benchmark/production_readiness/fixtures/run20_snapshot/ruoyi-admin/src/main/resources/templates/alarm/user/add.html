<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org">
<head>
	<th:block th:include="include :: header('新增通知用户')" />
</head>
<body>
    <div class="main-content">
        <form id="form-user-add" class="form-horizontal">
            <div class="row">
                <div class="col-sm-6">
                    <div class="form-group">
                        <label class="col-sm-4 control-label is-required">用户名称：</label>
                        <div class="col-sm-8">
                            <input name="userName" placeholder="请输入用户名称" class="form-control" type="text" maxlength="50" required>
                        </div>
                    </div>
                </div>
                <div class="col-sm-6">
                    <div class="form-group">
                        <label class="col-sm-4 control-label">Slack ID：</label>
                        <div class="col-sm-8">
                            <input name="slackId" placeholder="请输入Slack ID" class="form-control" type="text" maxlength="50">
                        </div>
                    </div>
                </div>
            </div>
            <div class="row">
                <div class="col-sm-6">
                    <div class="form-group">
                        <label class="col-sm-4 control-label">企业微信ID：</label>
                        <div class="col-sm-8">
                            <input name="wechatWorkId" placeholder="请输入企业微信ID" class="form-control" type="text" maxlength="50">
                        </div>
                    </div>
                </div>
                <div class="col-sm-6">
                    <div class="form-group">
                        <label class="col-sm-4 control-label">邮箱：</label>
                        <div class="col-sm-8">
                            <input name="email" placeholder="请输入邮箱" class="form-control email" type="text" maxlength="100">
                        </div>
                    </div>
                </div>
            </div>
            <div class="row">
                <div class="col-sm-6">
                    <div class="form-group">
                        <label class="col-sm-4 control-label">手机号：</label>
                        <div class="col-sm-8">
                            <input name="phone" placeholder="请输入手机号" class="form-control" type="text" maxlength="20">
                        </div>
                    </div>
                </div>
                <div class="col-sm-6">
                    <div class="form-group">
                        <label class="col-sm-4 control-label">内部推送ID：</label>
                        <div class="col-sm-8">
                            <input name="innerPushId" placeholder="请输入内部推送ID" class="form-control" type="text" maxlength="50">
                        </div>
                    </div>
                </div>
            </div>
            <div class="row">
                <div class="col-sm-6">
                    <div class="form-group">
                        <label class="col-sm-4 control-label">VoIP ID：</label>
                        <div class="col-sm-8">
                            <input name="voipId" placeholder="请输入VoIP ID" class="form-control" type="text" maxlength="50">
                        </div>
                    </div>
                </div>
                <div class="col-sm-6">
                    <div class="form-group">
                        <label class="col-sm-4 control-label">状态：</label>
                        <div class="col-sm-8">
                            <select name="status" class="form-control">
                                <option value="0" selected>启用</option>
                                <option value="1">禁用</option>
                            </select>
                        </div>
                    </div>
                </div>
            </div>
            <div class="row">
                <div class="col-sm-12">
                    <div class="form-group">
                        <label class="col-xs-2 control-label">备注：</label>
                        <div class="col-xs-10">
                            <textarea name="remark" maxlength="500" class="form-control" rows="3"></textarea>
                        </div>
                    </div>
                </div>
            </div>
        </form>
    </div>
    <div class="row">
        <div class="col-sm-offset-5 col-sm-10">
            <button type="button" class="btn btn-sm btn-primary" onclick="submitHandler()"><i class="fa fa-check"></i> 保 存</button>&nbsp;
            <button type="button" class="btn btn-sm btn-danger" onclick="closeItem()"><i class="fa fa-reply-all"></i> 关 闭</button>
        </div>
    </div>
    <th:block th:include="include :: footer" />
    <script type="text/javascript">
        var prefix = ctx + "alarm/user";
        
        $("#form-user-add").validate({
            onkeyup: false,
            rules: {
                userName: {
                    required: true,
                    maxlength: 50
                },
                email: {
                    email: true
                }
            },
            messages: {
                userName: {
                    required: "用户名称不能为空",
                    maxlength: "用户名称不能超过50个字符"
                }
            }
        });
        
        function submitHandler() {
            if (!$("#form-user-add").valid()) {
                return false;
            }
            $.ajax({
                type: "POST",
                url: prefix + "/add",
                data: $("#form-user-add").serialize(),
                success: function(result) {
                    if (result.code == 0) {
                        $.modal.alertSuccess("新增成功");
                        closeItem();
                    } else {
                        $.modal.alertError(result.msg);
                    }
                }
            });
        }
    </script>
</body>
</html>
