name: Docker Smoke

# 验证 "Swarm 一键拉起" 真实可用：docker compose build + up，探活 /api/health。
# 不依赖开发者本机有无 Docker —— GitHub runner 自带 docker + compose v2。
#
# 注意：CubeSandbox（远程沙箱执行服务器）不在 compose、CI 也不连它——
# SWARM_SANDBOX_* 留空。沙箱连不上不影响 Swarm 启动/建表/health（Worker 派发降级），
# 这正体现"沙箱是独立服务、Swarm 容器只是客户端"的边界。

on:
  push:
    branches: [main, master]
    paths:
      - "Dockerfile"
      - "docker-compose.yml"
      - ".dockerignore"
      - "pyproject.toml"
      - ".github/workflows/docker.yml"
  pull_request:
    branches: [main, master]
    paths:
      - "Dockerfile"
      - "docker-compose.yml"
      - ".dockerignore"
      - "pyproject.toml"
      - ".github/workflows/docker.yml"
  workflow_dispatch: {}

jobs:
  compose-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 写入最小 .env（CI 冒烟用；CubeSandbox 留空）
        run: |
          cat > .env <<'EOF'
          POSTGRES_USER=swarm
          POSTGRES_PASSWORD=swarm_ci_smoke
          POSTGRES_DB=swarm
          SWARM_PORT=8420
          SWARM_RBAC_ENABLED=true
          SWARM_SANDBOX_POOL_ENABLED=false
          SWARM_SECRET_KEY=ci-test-fixed-secret-key-not-for-production
          EOF

      - name: docker compose build
        run: docker compose build

      - name: docker compose up（后台）
        run: docker compose up -d

      - name: 等 swarm 服务 healthy（最多 ~150s）
        run: |
          cid="$(docker compose ps -q swarm)"
          echo "swarm container = $cid"
          for i in $(seq 1 30); do
            state=$(docker inspect --format '{{ .State.Status }}' "$cid" 2>/dev/null || echo "missing")
            health=$(docker inspect --format '{{ if .State.Health }}{{ .State.Health.Status }}{{ else }}no-healthcheck{{ end }}' "$cid" 2>/dev/null || echo "?")
            echo "[$i] state=$state health=$health"
            if [ "$health" = "healthy" ]; then echo "✅ swarm healthy"; exit 0; fi
            # 容器已退出/挂掉 → 不傻等，立即诊断
            if [ "$state" = "exited" ] || [ "$state" = "dead" ]; then
              echo "❌ swarm 容器已 $state"
              break
            fi
            sleep 5
          done
          echo "❌ swarm 未 healthy —— 诊断信息写入 step summary"
          {
            echo "## ❌ compose-smoke 失败诊断"
            echo '### docker compose ps'
            echo '```'
            docker compose ps
            echo '```'
            echo '### swarm 容器日志（tail 200）'
            echo '```'
            docker compose logs --no-color swarm 2>&1 | tail -200
            echo '```'
            echo '### swarm 容器 inspect（State）'
            echo '```'
            docker inspect --format '{{ json .State }}' "$cid" 2>&1 | head -c 2000
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
          # 同时打到控制台
          docker compose ps
          docker compose logs --no-color swarm 2>&1 | tail -200
          exit 1

      - name: 探活 /api/health（存活）+ /api/health/ready（就绪，真探 PG/Qdrant）
        run: |
          set -e
          body=$(curl -fsS http://localhost:8420/api/health)
          echo "health = $body"
          echo "$body" | grep -q '"status":"ok"'
          echo "✅ /api/health 返回 ok"
          # 就绪探针必须真连通 PG/Qdrant（否则 compose 内依赖没连上就该红，别只看存活假绿）
          ready=$(curl -fsS http://localhost:8420/api/health/ready)
          echo "ready = $ready"
          echo "$ready" | grep -q '"status":"ok"'
          echo "✅ /api/health/ready 依赖全连通"

      - name: 验证建表（startup 钩子应已幂等建全表）
        run: |
          set -e
          # 连 compose 内 postgres，确认核心表存在
          docker compose exec -T postgres psql -U swarm -d swarm -c "\dt" | tee /tmp/tables.txt
          for t in project task_records mem_user_profile swarm_users command_blacklist; do
            grep -q "$t" /tmp/tables.txt && echo "  ✅ 表 $t 存在" || { echo "  ❌ 缺表 $t"; exit 1; }
          done

      - name: 失败兜底 dump 全栈日志
        if: failure()
        run: docker compose logs --no-color | tail -200

      - name: 清理
        if: always()
        run: docker compose down -v
